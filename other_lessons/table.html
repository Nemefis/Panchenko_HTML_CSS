<!DOCTYPE html>
<html>
    <head>
        <title>Table</title>
    </head>
    <body>
        <table border="" bgcolor="yellow" width="500px" align="center" cellspacing="0px" cellpadding="10px" rules="all">
            <caption>Lesson 4</caption> <!--Ќазвание таблицы-->
            <tr align="center" valign="middle">                        <!--—трока-->
                <th bgcolor="orange"><font color="white">Column 1</font></th>          <!--Ќазвание колонки-->
                <th>Column 2</th>
                <th>Column 3</th>
            </tr>
            <tr align="center" bgcolor="white">
                <td bgcolor="orange"><font color="white">11</font></td>             <!--ƒанные в колонке-->
                <td>“екст в этой строке выровнен по центру по горизонтали и по вертикали</td>
                <td>33</td>
            </tr>
            <tr valign="bottom">
                <td bgcolor="orange"><font color="white">12</font></td>
                <td>“екст в этой €чейке выровнен по левому краю по горизонтали и вниз по вертикали</td>
                <td>36</td>
            </tr>
            <tr align="right" valign="top" bgcolor="white" style="border-bottom: 10px solid black;">
                <td bgcolor="orange" style="border-bottom: 10px solid red;"><font color="white">56</font></td>
                <td>“екст выровнен по правому краю по горизонтали и вверху по вертикали</td>
                <td>75</td>
            </tr>
        </table>
    </body>
</html>
