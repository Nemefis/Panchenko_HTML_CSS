<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Формы</title>
</head>
<body>
    <form action="">
        <input type="text" name="firstname" placeholder="Введите своё имя" required><br><br>
        <input type="text" name="lastname" placeholder="Введите свою фамилию"><br><br>
        <input type="email" name="e-mail" placeholder="Введите свой e-mail"><br><br>
        <input type="password" name="password" placeholder="Введите пароль" required><br><br>


        <input type="radio" name="age" value="18-30">18-30<br><br>
        <input type="radio" name="age" value="31-50">31-50<br><br>
        <p>Вы курите?</p>
        <input type="radio" name="smoke" value="yes">Да<br><br>
        <input type="radio" name="smoke" value="no">Нет<br><br>
        <input type="submit" name="submit">
    </form>
</body>
</html>
